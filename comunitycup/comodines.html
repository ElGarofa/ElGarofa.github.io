<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">COMODINES</h1>
<h2 id="coins"></h2>

<div class="card-grid" id="comodines"></div>

<script src="global.js"></script>
<script>

let nombres=[
"Segunda Vida","Inmunidad","Doble Oro","Cambio","Escudo","Boost","Revive","Mega Boost","Critico",
"Velocidad","Curacion","Reintento","Proteccion","XP x2","XP x3","Ataque+","Defensa+","Lucky",
"Anti Boss","No muerte","Ultra captura","Reset","Swap","Team Heal","Reflect","Counter","Focus",
"Furia","Modo Dios","Aura","Shield Max","Crit x2","Revive All","Overdrive","Ultra Heal","Dodge",
"Racha","Combo","Anti Crit","Hard Mode"
]

let div=document.getElementById("comodines")

nombres.forEach((n,i)=>{
div.innerHTML+=`
<div class="card-item">

<img src="https://images.pokemontcg.io/base1/${(i%16)+1}.png">

<h4>${n}</h4>

<p>Poder especial en partida</p>

<button class="btn-game" onclick="comprar('${n}',100)">
💰100
</button>

</div>
`
})

function comprar(n,p){
if(!gastarCoins(p)) return
popup("Compraste "+n)
}

actualizarCoins()

</script>
</body>
</html>
