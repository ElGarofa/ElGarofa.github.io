<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Community Cup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>


<body>


<nav class="navbar navbar-dark">

<div class="container">

<h2 class="neon-blue">

COMMUNITY CUP

</h2>

<div>

💰 Sinocoins:

<span id="coins">0</span>

</div>

</div>

</nav>



<div class="container-fluid mt-3">

<div class="row">


<!-- IZQUIERDA -->

<div class="col-lg-3">


<div class="neon-card">

<h4>Crear jugador</h4>

<input id="nombre"
class="form-control mb-2"
placeholder="Nombre">

<select id="rango"
class="form-control mb-2">

<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>

</select>

<input id="foto"
type="file"
class="form-control mb-2">


<button
class="btn btn-neon w-100"
onclick="crearJugador()">

Crear

</button>

</div>


<div class="neon-card">

<h4>Participantes</h4>

<div id="players">

</div>

</div>

</div>




<!-- CENTRO -->

<div class="col-lg-5">


<div class="neon-card">

<h4>Perfil</h4>

<div id="perfil">

Selecciona jugador

</div>

</div>


<div class="neon-card">

<h4>Torneo</h4>

<button
class="btn btn-purple mb-3"
onclick="generarTorneo()">

Generar torneo

</button>

<div id="torneo">

</div>

</div>

</div>



<!-- DERECHA -->

<div class="col-lg-4">


<div class="neon-card">

<h4>Ranking</h4>

<div id="ranking"></div>

</div>



<div class="neon-card">

<h4>Tramo actual</h4>

<select id="tramo"
class="form-control"
onchange="cambiarTramo()">

<option value="1">Tramo 1</option>
<option value="2">Tramo 2</option>
<option value="3">Tramo 3</option>
<option value="4">Tramo 4</option>

</select>

</div>



<div class="neon-card">

<h4>Misiones</h4>

<div id="misiones"></div>

</div>



<div class="neon-card">

<h4>Tienda</h4>

<div id="tienda"></div>

</div>


</div>


</div>

</div>



<script src="script.js"></script>


</body>

</html>
