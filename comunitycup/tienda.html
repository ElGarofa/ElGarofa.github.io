<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">TIENDA</h1>
<h2 id="coins"></h2>

<div class="card-ui" id="shop"></div>

<script src="global.js"></script>
<script>

let items=[

{name:"Pokemon Random",price:80,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png"},
{name:"Pokemon Fuerte",price:120,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png"},
{name:"Legendario",price:300,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/150.png"},

{name:"Captura Extra",price:60,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"},
{name:"Captura Ilimitada",price:200,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/ultra-ball.png"},

{name:"Revive",price:100,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/revive.png"},
{name:"Quitar Muerte",price:120,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/full-restore.png"},
{name:"Segunda Vida",price:150,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/max-revive.png"},

{name:"Boost Stats",price:150,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/x-attack.png"},
{name:"XP x2",price:180,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/rare-candy.png"},

{name:"Protección",price:130,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/guard-spec.png"},
{name:"Velocidad+",price:120,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/x-speed.png"},

{name:"Ataque+",price:140,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/x-attack.png"},
{name:"Defensa+",price:140,img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/x-defense.png"}

]

let div=document.getElementById("shop")

items.forEach(i=>{
div.innerHTML+=`
<div class="shopItem">

<span>${i.name} 💰${i.price}</span>

<button class="btn-game"
onclick="comprar('${i.name}',${i.price},'${i.img}')">

Comprar

</button>

</div>
`
})

function comprar(nombre,precio,img){

if(!gastarCoins(precio)) return

/* guardar compra */
if(localStorage.getItem("jugadorActual")){
let id=parseInt(localStorage.getItem("jugadorActual"))
let players=JSON.parse(localStorage.getItem("players")) || []

if(players[id]){
players[id].compras.push(nombre)
localStorage.setItem("players",JSON.stringify(players))
}
}

popup("Compraste "+nombre,img)

}

actualizarCoins()

</script>
</body>
</html>
